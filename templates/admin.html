<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>中医智伴 - 管理后台</title>
<style>
:root{--primary:#C23B22;--primary-dark:#A0311C;--primary-light:#F5E6E2;--bg:#FAF7F2;--card:#fff;--text:#2D2D2D;--text2:#666;--text3:#999;--success:#4CAF50;--warn:#FF9800;--error:#E53935;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,0.06)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:700}
.header .logout-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 16px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:13px}

.login-screen{max-width:360px;margin:80px auto;padding:24px;text-align:center}
.login-screen h2{font-size:22px;margin-bottom:24px}
.login-screen input{width:100%;padding:10px 14px;margin-bottom:12px;border:1px solid #ddd;border-radius:var(--radius);font-size:14px;outline:none;font-family:inherit}
.login-screen input:focus{border-color:var(--primary)}
.login-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

.tabs{display:flex;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:10}
.tab{flex:1;padding:14px;text-align:center;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab:hover{color:var(--primary);background:var(--primary-light)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

.tab-content{display:none;padding:16px}
.tab-content.active{display:block}

.section-title{font-size:15px;font-weight:600;margin:16px 0 12px;color:var(--text)}

.admin-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:8px;box-shadow:var(--shadow)}
.admin-card .card-title{font-size:14px;font-weight:600}
.admin-card .card-meta{font-size:12px;color:var(--text2);margin:4px 0}
.admin-card .card-body{font-size:12px;color:var(--text2);max-height:60px;overflow:hidden;line-height:1.5;margin:6px 0}
.admin-card .card-actions{display:flex;gap:8px;margin-top:8px}

.btn-approve{background:#E8F5E9;color:#2E7D32;border:none;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-reject{background:#FFEBEE;color:#C62828;border:none;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-view{background:#E3F2FD;color:#1565C0;border:none;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-edit-ai{background:#FFF8E1;color:#F57F17;border:none;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-import{background:#E8F5E9;color:#1B5E20;border:none;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:14px;cursor:pointer;font-family:inherit}

.settings-group{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.settings-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px}
.settings-group input{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;margin-bottom:10px;outline:none;font-family:inherit}
.settings-group input:focus{border-color:var(--primary)}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:rgba(45,45,45,0.92);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.25s;pointer-events:none}
.toast.show{opacity:1}

.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.error-msg{color:var(--error);font-size:13px;margin-top:8px;display:none}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:none;justify-content:center;align-items:flex-start;padding:40px 16px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:20px;max-width:600px;width:100%;margin:auto;box-shadow:0 8px 32px rgba(0,0,0,0.18);position:relative}
.modal-title{font-size:16px;font-weight:600;margin-bottom:12px;padding-right:30px}
.modal-section{background:#f9f9f9;border-radius:8px;padding:12px;margin-bottom:10px}
.modal-section .section-label{font-size:11px;color:#999;font-weight:600;text-transform:uppercase;margin-bottom:6px}
.modal-section .section-body{font-size:13px;line-height:1.6;color:#333;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto}
.modal-section .section-body.json-view{background:#f0f0f0;padding:8px;border-radius:4px;font-family:monospace;font-size:12px}

</style>
</head><body>
<div class="toast" id="toast"></div>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <h2>管理后台登录</h2>
  <input type="text" id="adminPhone" placeholder="手机号" value="13800000000">
  <input type="password" id="adminPassword" placeholder="密码" value="admin123">
  <div class="error-msg" id="loginError"></div>
  <button class="login-btn" onclick="adminLogin()">登录</button>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
  <div class="header">
    <h1>中医智伴 · 管理后台</h1>
    <button class="logout-btn" onclick="adminLogout()">退出登录</button>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="tabReview" onclick="switchTab(this)">内容审核</button>
    <button class="tab" data-tab="tabMembers" onclick="switchTab(this)">会员管理</button>
    <button class="tab" data-tab="tabSettings" onclick="switchTab(this)">系统设置</button>
    <button class="tab" data-tab="tabApplications" onclick="switchTab(this)">申请审核</button>
    <button class="tab" data-tab="tabAISettings" onclick="switchTab(this)">AI设置</button>
  </div>

  <!-- Tab: Content Review -->
  <div class="tab-content active" id="tabReview">
    <div class="section-title">待审核内容</div>
    <div id="pendingList"></div>
  </div>

  <!-- Tab: Members -->
  <div class="tab-content" id="tabMembers">
    <div class="section-title">会员列表</div>
    <div id="memberList"></div>
  </div>

  <!-- Tab: Settings -->
  <div class="tab-content" id="tabSettings">
    <div class="section-title">会员设置</div>
    <div class="settings-group">
      <label>年费（元）</label>
      <input type="number" id="memberFee" value="199">
      <label>会员时长（天）</label>
      <input type="number" id="memberDays" value="365">
      <button class="btn-primary" onclick="saveAdminSettings()">保存设置</button>
    </div>
  </div>

  <!-- Tab: Applications -->
  <div class="tab-content" id="tabAISettings">
    <div class="section-title">AI 大模型设置</div>
    <div class="settings-group">
      <label>API Key</label>
      <input type="password" id="aiApiKey" placeholder="请输入DeepSeek API Key">
      <label>模型</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="aiModel" value="deepseek-chat" style="flex:1" placeholder="选择或输入模型名称">
        <button class="btn-view" onclick="getModels()">获取模型列表</button>
      </div>
      <div id="modelListContainer" style="display:none;margin-top:6px">
        <select id="aiModelSelect" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit" onchange="document.getElementById('aiModel').value=this.value">
          <option value="">选择模型...</option>
        </select>
      </div>
      <label>API 地址</label>
      <input type="text" id="aiApiUrl" value="https://api.deepseek.com/v1/chat/completions">
      <label>
        <input type="checkbox" id="aiAutoApprove" checked>
        自动审核通过（AI识别后直接发布，无需人工审核）
      </label>
      <br><br>
      <button class="btn-primary" onclick="saveAISettings()">保存 AI 设置</button>
    </div>
  </div>

  <!-- Tab: Applications -->
  <div class="tab-content" id="tabApplications">
    <div class="section-title">贡献者续期申请</div>
    <div id="appList"></div>
  </div>
</div>

<script>
var token='';
function t(m){var o=document.getElementById('toast');o.textContent=m;o.classList.add('show');clearTimeout(o._timer);o._timer=setTimeout(function(){o.classList.remove('show');},2000);}
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

async function api(path,opts){
  var headers={'Content-Type':'application/json'};
  if(token) headers['Authorization']='Bearer '+token;
  var conf={headers:headers};
  if(opts){if(opts.method) conf.method=opts.method;if(opts.body) conf.body=JSON.stringify(opts.body);}
  var resp=await fetch(path,conf);
  var data=await resp.json();
  if(!resp.ok && data.error) throw new Error(data.error);
  return data;
}

async function adminLogin(){
  var phone=document.getElementById('adminPhone').value.trim();
  var password=document.getElementById('adminPassword').value;
  var err=document.getElementById('loginError');
  try{
    var r=await api('/api/auth/login',{method:'POST',body:{phone:phone,password:password}});
    if(r.user.role!=='admin'){err.textContent='该账号非管理员';err.style.display='block';return;}
    token=r.token;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadPending();loadMemberSettings();loadMemberList();loadApplications();loadAISettings();
  }catch(e){err.textContent=e.message;err.style.display='block';}
}

function adminLogout(){token='';document.getElementById('loginScreen').style.display='block';document.getElementById('dashboard').style.display='none';}

function switchTab(el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
  document.getElementById(el.dataset.tab).classList.add('active');
  if(el.dataset.tab==='tabReview') loadPending();
  if(el.dataset.tab==='tabMembers') loadMemberList();
  if(el.dataset.tab==='tabSettings') loadMemberSettings();
  if(el.dataset.tab==='tabApplications') loadApplications();
  if(el.dataset.tab==='tabAISettings') loadAISettings();
}

/* Content Review */
async function loadPending(){
  var el=document.getElementById('pendingList');
  try{
    var pending=await api('/api/admin/pending?status=pending');
    window._pendingList=pending;
    if(!pending.length){el.innerHTML='<div class="empty-state">暂无待审核内容</div>';return;}
    var h=[];
    for(var i=0;i<pending.length;i++){
      var r=pending[i];
      h.push('<div class="admin-card"><div class="card-title">'+esc((r.ai_result&&r.ai_result.title)||'待审核内容')+'</div><div class="card-meta">上传者: '+esc(r.uploader_name||'')+' | '+esc(r.created_at||'')+'</div><div class="card-body">'+esc((r.content||'').substring(0,200))+'</div><div class="card-actions"><button class="btn-view" onclick="reviewView('+r.id+')">🔍 查阅</button><button class="btn-edit-ai" onclick="editAI('+r.id+')">✏️ AI编辑</button><button class="btn-import" onclick="importCheck('+r.id+')">📥 资料入库</button><button class="btn-approve" onclick="approve('+r.id+')">通过</button><button class="btn-reject" onclick="reject('+r.id+')">驳回</button></div></div>');
    }
    el.innerHTML=h.join('');
  }catch(e){el.innerHTML='<div class="empty-state">加载失败</div>';}
}
async function approve(id){try{await api('/api/admin/review',{method:'POST',body:{upload_id:id,action:'approve'}});t('已通过');loadPending();}catch(e){t(e.message);}}
async function reject(id){var r=prompt('驳回理由：');if(!r)return;try{await api('/api/admin/review',{method:'POST',body:{upload_id:id,action:'reject',review_note:r}});t('已驳回');loadPending();}catch(e){t(e.message);}}

/* Members */
async function loadMemberList(){
  var el=document.getElementById('memberList');
  try{
    var members=await api('/api/admin/member/list');
    if(!members.length){el.innerHTML='<div class="empty-state">暂无会员</div>';return;}
    var h=[];
    for(var i=0;i<members.length;i++){
      var m=members[i];
      h.push('<div class="admin-card"><div class="card-title">'+esc(m.username)+'</div><div class="card-meta">手机: '+esc(m.phone)+' | 类型: '+esc(m.type)+' | 状态: '+esc(m.status)+'</div><div class="card-meta">到期: '+(m.end_date?m.end_date.substring(0,10):'-')+'</div></div>');
    }
    el.innerHTML=h.join('');
  }catch(e){el.innerHTML='<div class="empty-state">加载失败</div>';}
}

/* Settings */
async function loadMemberSettings(){
  try{
    var s=await api('/api/admin/member/settings');
    document.getElementById('memberFee').value=s.annual_fee;
    document.getElementById('memberDays').value=s.free_duration_days;
  }catch(e){}
}
async function saveAdminSettings(){
  try{
    var r=await api('/api/admin/member/settings',{method:'POST',body:{annual_fee:parseFloat(document.getElementById('memberFee').value),free_duration_days:parseInt(document.getElementById('memberDays').value)}});
    t(r.message);
  }catch(e){t(e.message);}
}

/* AI Settings */
async function loadAISettings(){
  try{
    var s=await api('/api/admin/ai/settings');
    document.getElementById('aiApiKey').value=s.api_key||'';
    document.getElementById('aiModel').value=s.model||'deepseek-chat';
    document.getElementById('aiApiUrl').value=s.api_url||'https://api.deepseek.com/v1/chat/completions';
    document.getElementById('aiAutoApprove').checked=!!s.auto_approve;
  }catch(e){}
}
async function saveAISettings(){
  try{
    var r=await api('/api/admin/ai/settings',{method:'POST',body:{api_key:document.getElementById('aiApiKey').value,model:document.getElementById('aiModel').value,api_url:document.getElementById('aiApiUrl').value,auto_approve:document.getElementById('aiAutoApprove').checked}});
    t('保存成功！AI设置已更新');
  }catch(e){t(e.message);}
}
async function getModels(){
  var key=document.getElementById('aiApiKey').value.trim();
  var url=document.getElementById('aiApiUrl').value.trim()||'https://api.deepseek.com/v1';
  if(!key){t('请先输入API Key');return;}
  var baseUrl=url.replace('/chat/completions','').replace('/v1','')+'/v1';
  try{
    var resp=await fetch(baseUrl+'/models',{headers:{'Authorization':'Bearer '+key}});
    var data=await resp.json();
    if(!resp.ok) throw new Error(data.error?.message||'获取失败');
    var sel=document.getElementById('aiModelSelect');
    sel.innerHTML='<option value="">选择模型...</option>';
    for(var i=0;i<data.data.length;i++){
      var m=data.data[i];
      var id=m.id||m;
      sel.innerHTML+='<option value="'+esc(id)+'">'+esc(id)+'</option>';
    }
    document.getElementById('modelListContainer').style.display='block';
    t('已获取 '+data.data.length+' 个模型，请选择');
  }catch(e){t('获取模型列表失败: '+e.message);}
}

/* Applications */
async function loadApplications(){
  var el=document.getElementById('appList');
  try{
    var apps=await api('/api/admin/member/applications');
    if(!apps.length){el.innerHTML='<div class="empty-state">暂无申请</div>';return;}
    var h=[];
    for(var i=0;i<apps.length;i++){
      var a=apps[i];
      h.push('<div class="admin-card"><div class="card-title">'+esc(a.username)+'</div><div class="card-meta">类型: '+esc(a.type)+' | 状态: '+esc(a.status)+'</div>'+(a.status==='pending'?'<div class="card-actions"><button class="btn-approve" onclick="appApprove('+a.id+')">批准</button><button class="btn-reject" onclick="appReject('+a.id+')">拒绝</button></div>':'')+'</div>');
    }
    el.innerHTML=h.join('');
  }catch(e){el.innerHTML='<div class="empty-state">加载失败</div>';}
}
async function appApprove(id){try{await api('/api/admin/member/applications',{method:'POST',body:{application_id:id,action:'approve'}});t('已批准');loadApplications();loadMemberList();}catch(e){t(e.message);}}
async function appReject(id){var r=prompt('驳回理由：');if(!r)return;try{await api('/api/admin/member/applications',{method:'POST',body:{application_id:id,action:'reject',review_note:r}});t('已驳回');loadApplications();}catch(e){t(e.message);}}

function reviewView(id){
  _curRvId=id;
  var list=window._pendingList||[];
  var r=null;
  for(var i=0;i<list.length;i++){if(list[i].id==id){r=list[i];break;}}
  if(!r){t('\u6570\u636e\u672a\u627e\u5230');return;}
  var ai=r.ai_result||{};
  var treats=ai.treatments||(ai.title?[ai]:[]);
  var content=r.content||'(\u65e0\u6587\u5b57\u5185\u5bb9)';
  var files=r.file_names||'';
  var fileHtml=files?'<div class="modal-section"><div class="section-label">\u4e0a\u4f20\u6587\u4ef6</div><div class="section-body">'+esc(files.replace(/,/g,String.fromCharCode(10)))+'</div></div>':'';
  var tabs='<div style="display:flex;border-bottom:1px solid #eee;margin-bottom:4px">'
    +'<span class="review-tab active" onclick="showRvTab(this,'+'file'+')">\U0001f4c4 \u539f\u6587\u4ef6</span>'
    +'<span class="review-tab" onclick="showRvTab(this,'+'ai'+')">\u2728 AI\u7f16\u8f91</span>'
    +'<span class="review-tab" onclick="showRvTab(this,'+'import'+')">\U0001f4e5 \u5165\u5e93</span></div>';
  var tab1='<div class="review-panel show" id="rvTabFile">'
    +'<div class="modal-section"><div class="section-label">\u539f\u6587\u5185\u5bb9</div><div class="section-body" style="max-height:400px">'+esc(content)+'</div></div>'
    +fileHtml
    +'<div class="modal-section"><div class="section-label">\u4e0a\u4f20\u8005 / \u65f6\u95f4</div><div class="section-body">'+esc(r.uploader_name||'')+' | '+esc(r.created_at||'')+'</div></div>'
    +'<div class="review-actions"><button class="btn-edit-ai" onclick="showRvTab(document.querySelector('+'.review-tab:nth-child(2)'+'),'+'ai'+')">\u27a1\ufe0f \u786e\u8ba4\u65e0\u8bef\uff0c\u8fdb\u5165AI\u7f16\u8f91</button></div></div>';
  var tab2='<div class="review-panel" id="rvTabAI" style="max-height:500px;overflow-y:auto">';
  if(treats.length){
    tab2+='<table class="review-table"><tr><th>#</th><th>\u6807\u9898</th><th>\u75be\u75c5</th><th>\u5206\u7c7b</th><th>\u7597\u6cd5\u7c7b\u578b</th><th>\u65b9\u5242/\u7a74\u4f4d</th></tr>';
    for(var i=0;i<treats.length;i++){
      var t=treats[i];
      var types=(t.types||[]).join(', ');
      var fc=t.formulas?t.formulas.length+' \u65b9':'';
      var ac=t.acupoints?t.acupoints.length+' \u7a74':'';
      tab2+='<tr><td>'+(i+1)+'</td><td>'+esc(t.title||'')+'</td><td>'+esc(t.disease||'')+'</td><td>'+esc(t.category||'')+'</td><td>'+esc(types)+'</td><td>'+fc+ac+'</td></tr>';
    }
    tab2+='</table>';
  } else {
    tab2+='<div class="empty-state" style="padding:20px">AI\u672a\u63d0\u53d6\u5230\u7597\u7a0b\u6570\u636e</div>';
  }
  tab2+='<div class="review-actions"><button class="btn-edit-ai" onclick="editRvAI()">\u270f\ufe0f \u7f16\u8f91\u6570\u636e</button><button class="btn-import" onclick="rvCheckImport()">\U0001f4e5 \u8d44\u6599\u5165\u5e93</button></div></div>';
  var tab3='<div class="review-panel" id="rvTabImport"><div id="rvImportContent"></div></div>';
  var html='<div class="modal-title">\U0001f50d \u5ba1\u6838\u7ba1\u7406</div>'+tabs+tab1+tab2+tab3
    +'<div class="review-actions"><button class="btn-approve" onclick="rvApprove()">\u901a\u8fc7</button><button class="btn-reject" onclick="rvReject()">\u9a73\u56de</button></div>';
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modalOverlay').classList.add('show');
}
function showRvTab(el,tab){
  document.querySelectorAll('.review-tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.querySelectorAll('.review-panel').forEach(function(p){p.classList.remove('show');});
  var tabId='rvTab'+tab.charAt(0).toUpperCase()+tab.slice(1);
  document.getElementById(tabId).classList.add('show');
  if(tab==='import') rvCheckImport();
}
var _curRvId=0, _rvDupIds=[];
function editRvAI(){
  var list=window._pendingList||[]; var r=null;
  for(var i=0;i<list.length;i++){if(list[i].id==_curRvId){r=list[i];break;}}
  if(!r){t('\u6570\u636e\u672a\u627e\u5230');return;}
  var ai=r.ai_result||{};
  document.getElementById('aiEditId').value=_curRvId;
  document.getElementById('aiEditTitle').value=ai.title||'';
  document.getElementById('aiEditDisease').value=ai.disease||'';
  document.getElementById('aiEditCategory').value=ai.category||'';
  document.getElementById('aiEditTypes').value=(ai.types||[]).join(',');
  document.getElementById('aiEditPreview').value=ai.preview||'';
  document.getElementById('aiEditContent').value=ai.full_content||'';
  document.getElementById('aiEditModal').classList.add('show');
}
async function saveRvAIEdit(){
  var id=parseInt(document.getElementById('aiEditId').value);
  try{
    await api('/api/admin/upload/edit-ai',{method:'POST',body:{
      upload_id:id, ai_title:document.getElementById('aiEditTitle').value,
      ai_disease:document.getElementById('aiEditDisease').value,
      ai_category:document.getElementById('aiEditCategory').value,
      ai_types:document.getElementById('aiEditTypes').value.split(',').map(function(s){return s.trim();}).filter(function(s){return s;}),
      ai_preview:document.getElementById('aiEditPreview').value,
      ai_full_content:document.getElementById('aiEditContent').value
    }});
    t('\u4fdd\u5b58\u6210\u529f'); closeAIModal(); loadPending(); reviewView(id);
  }catch(e){t(e.message);}
}
function rvCheckImport(){rvCheckImportImpl();}
async function rvCheckImportImpl(){
  try{
    var r=await api('/api/admin/upload/check-duplicates',{method:'POST',body:{upload_id:_curRvId}});
    var dups=r.duplicates||[];
    var list=window._pendingList||[]; var item=null;
    for(var i=0;i<list.length;i++){if(list[i].id==_curRvId){item=list[i];break;}}
    var ai=(item&&item.ai_result)||{};
    var treats=ai.treatments||(ai.title?[ai]:[]);
    var html='';
    if(treats.length){
      html+='<div class="modal-section" style="background:#E3F2FD"><div class="section-label">\U0001f4cb \u5373\u5c06\u5165\u5e93\u7684\u5185\u5bb9</div><div style="font-size:13px;max-height:250px;overflow-y:auto">';
      for(var i=0;i<treats.length;i++){
        var t=treats[i];
        html+='<div style="padding:8px;margin-bottom:4px;background:#fff;border-radius:6px;border-left:3px solid #1565C0"><div style="font-weight:500">'+esc(t.title||'')+'</div><div style="font-size:11px;color:#666">'+esc(t.disease||'')+' | '+esc(t.category||'')+' | '+(t.formulas?t.formulas.length+'\u65b9':'')+(t.acupoints?t.acupoints.length+'\u7a74':'')+'</div></div>';
      }
      html+='</div></div>';
    }
    _rvDupIds=[];
    if(dups.length){
      var dl='<div class="modal-section" style="background:#FFF3E0"><div class="section-label">\u26a0\ufe0f \u53d1\u73b0\u53ef\u80fd\u91cd\u590d\u7684\u6570\u636e</div><div style="font-size:13px;max-height:200px;overflow-y:auto">';
      for(var i=0;i<dups.length;i++){
        var cid='dup_'+(dups[i].id||i);
        dl+='<div style="padding:8px;margin-bottom:4px;background:#fff;border-radius:6px;border-left:3px solid #FF9800"><label><input type="checkbox" id="'+cid+'" checked onchange="rvDupToggle(this)"> <strong>'+esc(dups[i].title)+'</strong></label><div style="font-size:11px;color:#666;margin-left:22px">'+esc(dups[i].match)+' | '+esc(dups[i].preview)+'</div></div>';
      }
      dl+='</div></div>';
      html+=dl;
    }
    html+='<div style="text-align:center;margin-top:16px">';
    if(dups.length){
      html+='<button class="btn-import" onclick="rvDoImport(false)" style="padding:10px 24px">继繼入库</button> ';
      html+='<button class="btn-edit-ai" onclick="rvDoImport(true)" style="padding:10px 24px">去掉相同内容后入库</button>';
    } else {
      html+='<button class="btn-import" onclick="rvDoImport(false)" style="padding:10px 24px">确定入库</button>';
    }
    html+='</div>';
    document.getElementById('rvImportContent').innerHTML=html;
  }catch(e){t(e.message);}
}
function rvDupToggle(el){
  var title=(el.parentNode.textContent||'').trim();
  if(!el.checked) _rvDupIds.push(title); else _rvDupIds=_rvDupIds.filter(function(s){return s!==title;});
}
async function rvDoImport(skipDups){
  var skipTitles=''; if(skipDups && _rvDupIds.length) skipTitles=_rvDupIds.join(',');
  try{
    var r=await api('/api/admin/upload/import',{method:'POST',body:{upload_id:_curRvId,skip_titles:skipTitles}});
    t(r.message); closeModal(); loadPending();
  }catch(e){t(e.message);}
}
async function rvApprove(){
  try{await api('/api/admin/review',{method:'POST',body:{upload_id:_curRvId,action:'approve'}});t('\u5df2\u901a\u8fc7');closeModal();loadPending();}catch(e){t(e.message);}
}
async function rvReject(){
  var note=prompt('\u9a73\u56de\u7406\u7531\uff1a');if(!note)return;
  try{await api('/api/admin/review',{method:'POST',body:{upload_id:_curRvId,action:'reject',review_note:note}});t('\u5df2\u9a73\u56de');closeModal();loadPending();}catch(e){t(e.message);}
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}


/* AI Edit & Import */
var _currentImportId = 0;
function editAI(id){
  _currentImportId=id;
  var list=window._pendingList||[];
  var r=null;
  for(var i=0;i<list.length;i++){if(list[i].id==id){r=list[i];break;}}
  if(!r){t('数据未找到');return;}
  var ai=r.ai_result||{};
  document.getElementById('aiEditId').value=id;
  document.getElementById('aiEditTitle').value=ai.title||'';
  document.getElementById('aiEditDisease').value=ai.disease||'';
  document.getElementById('aiEditCategory').value=ai.category||'';
  document.getElementById('aiEditTypes').value=(ai.types||[]).join(',');
  document.getElementById('aiEditPreview').value=ai.preview||'';
  document.getElementById('aiEditContent').value=ai.full_content||'';
  document.getElementById('aiEditModal').classList.add('show');
}
function closeAIModal(){document.getElementById('aiEditModal').classList.remove('show');}
async function saveAIEdit(){
  var id=parseInt(document.getElementById('aiEditId').value);
  try{
    var r=await api('/api/admin/upload/edit-ai',{method:'POST',body:{
      upload_id:id,
      ai_title:document.getElementById('aiEditTitle').value,
      ai_disease:document.getElementById('aiEditDisease').value,
      ai_category:document.getElementById('aiEditCategory').value,
      ai_types:document.getElementById('aiEditTypes').value.split(',').map(function(s){return s.trim();}).filter(function(s){return s;}),
      ai_preview:document.getElementById('aiEditPreview').value,
      ai_full_content:document.getElementById('aiEditContent').value
    }});
    t(r.message);
    closeAIModal();
    loadPending();
  }catch(e){t(e.message);}
}
async function importCheck(id){
  _currentImportId=id;
  try{
    var r=await api('/api/admin/upload/check-duplicates',{method:'POST',body:{upload_id:id}});
    var dup=r.duplicates||[];
    var list=window._pendingList||[];
    var item=null;
    for(var i=0;i<list.length;i++){if(list[i].id==id){item=list[i];break;}}
    var ai=(item&&item.ai_result)||{};
    var treats=ai.treatments||(ai.title?[ai]:[]);
    var html='';
    if(treats.length){
      var ph='<div class="modal-section" style="background:#E3F2FD"><div class="section-label">📋 即将入库的内容</div><div style="font-size:13px;max-height:250px;overflow-y:auto">';
      for(var i=0;i<treats.length;i++){
        var t=treats[i];
        var types=(t.types||[]).join(',')||'未指定';
        ph+='<div style="padding:10px;margin-bottom:6px;background:#fff;border-radius:6px;border-left:3px solid #1565C0"><div style="font-weight:500">'+esc(t.title||'未命名')+'</div><div style="font-size:11px;color:#666;margin-top:2px">疾病: '+esc(t.disease||'')+' 分类: '+esc(t.category||'')+' 类型: '+esc(types)+'</div><div style="font-size:11px;color:#999;margin-top:2px">'+(t.formulas?t.formulas.length+' 个方剂 | ':'')+(t.acupoints?t.acupoints.length+' 个穴位':'')+'</div></div>';
      }
      ph+='</div></div>';
      html+=ph;
    }
    html+='<div id="importDupList"></div><div id="importAction" style="text-align:center;margin-top:16px"></div>';
    document.getElementById('importContent').innerHTML=html;
    if(dup.length){
      var dl='<div class="modal-section" style="background:#FFF3E0"><div class="section-label">⚠️ 发现可能重复的数据</div><div style="font-size:13px;max-height:200px;overflow-y:auto">';
      for(var i=0;i<dup.length;i++){
        dl+='<div style="padding:8px;margin-bottom:4px;background:#fff;border-radius:6px;border-left:3px solid #FF9800"><div style="font-weight:500">'+esc(dup[i].title)+'</div><div style="font-size:11px;color:#666">'+esc(dup[i].match)+' | '+esc(dup[i].preview)+'</div></div>';
      }
      dl+='</div></div>';
      document.getElementById('importDupList').innerHTML=dl;
      document.getElementById('importAction').innerHTML='<p style="font-size:13px;color:#666;margin:8px 0">以上内容与新上传的数据相似，是否继续入库？</p><button class="btn-import" onclick="confirmImport('+id+')" style="padding:10px 32px">继续入库</button><button class="btn-reject" onclick="closeImportModal()" style="margin-left:8px;padding:10px 24px">取消</button>';
    } else {
      document.getElementById('importDupList').innerHTML='<div class="modal-section" style="background:#E8F5E9"><div class="section-label">✔️ 未发现重复数据</div></div>';
      document.getElementById('importAction').innerHTML='<button class="btn-import" onclick="confirmImport('+id+')" style="padding:10px 32px">确定入库</button><button class="btn-reject" onclick="closeImportModal()" style="margin-left:8px;padding:10px 24px">取消</button>';
    }
    document.getElementById('importModal').classList.add('show');
  }catch(e){t(e.message);}
}
function closeImportModal(){document.getElementById('importModal').classList.remove('show');}
async function confirmImport(id){
  try{
    var r=await api('/api/admin/upload/import',{method:'POST',body:{upload_id:id}});
    t(r.message);
    closeImportModal();
    loadPending();
  }catch(e){t(e.message);}
}
